<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HabitFlow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🌱 HabitFlow</h1>
    <p>Build habits that stick</p>
    
    <div class="add-habit">
      <input type="text" id="habitInput" placeholder="Add a habit... e.g. Drink water">
      <button id="addBtn">Add</button>
    </div>
    
    <ul id="habitList">
      <!-- Habits will show here -->
    </ul>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
